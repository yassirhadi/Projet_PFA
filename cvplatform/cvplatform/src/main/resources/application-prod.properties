# ==================================================
# Production — MySQL (aucun secret en dur : utiliser l’environnement)
# ==================================================
spring.config.activate.on-profile=prod

# Obligatoire en prod : DB_URL, DB_USERNAME, DB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Pool production
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=CVPlatform-HikariCP-Prod

# Logging
logging.level.root=INFO
logging.level.com.ahmed.pfa.cvplatform=INFO
