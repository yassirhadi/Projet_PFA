# ==================================================
# Development Configuration
# ==================================================
spring.config.activate.on-profile=dev

# ==================================================
# MySQL \u2014 DataSource (profil dev)
# ==================================================
# Variables d'environnement (recommand\u00E9) :
#   DB_URL      \u2014 JDBC compl\u00E8te (d\u00E9faut : localhost/cv_platform)
#   DB_USERNAME \u2014 utilisateur root
#   DB_PASSWORD \u2014 mot de passe zayn2020
#
# Cr\u00E9ation base : CREATE DATABASE cv_platform CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
#
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cv_platform?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:hadi}

# JWT Development
jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
jwt.expiration=86400000

# Debug & JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==================================================
# Actuator Configuration (Development)
# ==================================================
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.health.defaults.enabled=true
management.health.diskspace.enabled=true
management.health.db.enabled=true

# ==================================================
# Application Info
# ==================================================
info.app.name=CV Platform
info.app.description=Plateforme de gestion de CVs avec analyse IA
info.app.version=1.0.0-DEV
info.app.encoding=@project.build.sourceEncoding@
info.app.java.version=@java.version@

# ==================================================
# Logging Configuration (Development)
# ==================================================
logging.level.root=INFO
logging.level.com.ahmed.pfa.cvplatform=DEBUG
logging.level.com.ahmed.pfa.cvplatform.security=DEBUG
logging.level.com.ahmed.pfa.cvplatform.service=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx

logging.file.name=logs/cvplatform-dev.log
logging.file.max-size=10MB
logging.file.max-history=7
logging.file.total-size-cap=100MB

# ==================================================
# Hikari Connection Pool (Development)
# ==================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.pool-name=CVPlatform-HikariCP-Dev
