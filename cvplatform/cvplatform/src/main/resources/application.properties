# ==================================================
# Application Base Configuration
# ==================================================
spring.application.name=cv-platform

# Profil actif : SPRING_PROFILES_ACTIVE (standard Spring) ou SPRING_PROFILE (alias projet)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:${SPRING_PROFILE:dev}}

# ==================================================
# JPA/Hibernate Configuration
# ==================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Coh\u00E9rent avec serverTimezone=UTC dans l'URL JDBC MySQL
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# ==================================================
# Server Configuration
# ==================================================
server.port=${SERVER_PORT:8080}

# ==================================================
# File Upload Configuration
# ==================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.servlet.multipart.file-size-threshold=2KB
# Chemin absolu pour \u00E9viter les probl\u00E8mes
# Windows :
file.upload-dir=${UPLOAD_DIR:C:/cv-uploads}
# Linux/Mac : d\u00E9commente la ligne ci-dessous et commente celle du dessus
# file.upload-dir=${UPLOAD_DIR:/tmp/cv-uploads}

# ==================================================
# CORS Configuration
# ==================================================
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173}

# ==================================================
# API Configuration
# ==================================================
api.version=v1

# ==================================================
# Actuator Configuration
# ==================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ==================================================
# Database Connection Pool
# ==================================================
# Hikari configuration is profile-specific:
# - dev: 10 max connections (see application-dev.properties)
# - prod: 50 max connections (see application-prod.properties)
# Leak detection enabled (60s threshold)

# ==================================================
# JWT CONFIGURATION (REFRESH TOKEN SYSTEM)
# ==================================================
# Secret key (minimum 256 bits for HS256)
# IMPORTANT: Change in production with a secure random key
jwt.secret=CvPlatformSecretKeyForJWTTokenGenerationMinimum256BitsRequired2024RefreshTokenSystem

# ACCESS TOKEN (short duration: 15 minutes = 900000 ms)
# Short to limit exposure in case of compromise
jwt.access.expiration=900000

# REFRESH TOKEN (long duration: 7 days = 604800000 ms)
# Long to avoid forcing user to reconnect frequently
jwt.refresh.expiration=604800000

# IA Service Configuration (add at the end)
ia.api.url=http://localhost:5000/analyze
ia.api.enabled=false
ia.api.timeout.seconds=30
ia.mock.enabled=true

# ==================================================
# Swagger/OpenAPI Configuration
# ==================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=false

# Show validation errors
springdoc.show-actuator=false
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json

# ==================================================
# Logging Configuration (pour d\u00E9boguer les uploads)
# ==================================================
logging.level.org.springframework.web.multipart=DEBUG
logging.level.com.ahmed.pfa.cvplatform=DEBUG