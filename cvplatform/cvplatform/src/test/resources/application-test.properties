# ==================================================
# Test Profile Configuration
# ==================================================
# Note: Profile is activated by @ActiveProfiles("test") in BaseIntegrationTest

# ==================================================
# Database Configuration - H2 In-Memory (Fast Tests)
# ==================================================
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==================================================
# JPA/Hibernate Configuration
# ==================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ==================================================
# JWT Configuration (Test Values)
# ==================================================
jwt.secret=testSecretKeyForIntegrationTestsOnly1234567890
jwt.access.expiration=900000
jwt.refresh.expiration=604800000

# ==================================================
# File Storage (Test Directory)
# ==================================================
file.upload.dir=./test-uploads

# ==================================================
# IA Service (MOCK Mode for Tests)
# ==================================================
ia.api.url=http://localhost:5000/analyze
ia.api.enabled=false
ia.mock.enabled=true
ia.api.timeout.seconds=30

# ==================================================
# Logging (Reduced for Tests)
# ==================================================
logging.level.root=WARN
logging.level.com.ahmed.pfa.cvplatform=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG

# ==================================================
# Server Configuration
# ==================================================
server.port=0